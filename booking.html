<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Booking | WashWave Laundry</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <div class="logo">
        <h1>🫧 WashWave Laundry</h1>
    </div>

    <nav>

        <a href="index.html">Home</a>

        <a href="about.html">About</a>

        <a href="services.html">Services</a>

        <a href="booking.html">Booking</a>

        <a href="booking-history.html">Booking History</a>

        <a href="contact.html">Contact</a>

    </nav>

</header>

<section class="booking-page">

    <h1>Book Your Laundry</h1>

    <p>Fill in the information below.</p>

    <form class="booking-form">

        <label>Customer Name</label>

        <input
        type="text"
        id="customerName"
        placeholder="Enter Customer Name"
        required>

        <label>Phone Number</label>

        <input
        type="tel"
        id="phone"
        placeholder="Enter Phone Number"
        required>
        
        <label>Booking Date</label>

        <input
        type="date"
        id="date"
        required>

        <label>Booking Time</label>

        <input
        type="time"
        id="time"
        required>

        <label>Select Service</label>

    <select id="service">

        <option value="Wash">Wash</option>

        <option value="Wash & Dry">Wash & Dry</option>

        <option value="Dry">Dry</option>

    </select>
        

        <label>Weight (kg)</label>

        <input
        type="number"
        id="weight"
        placeholder="Enter Weight"
        min="1"
        required>


        <button
        type="button"
        onclick="calculatePrice()">

            Calculate Price

        </button>

    </form>

</section>

<footer>

    <p>©2026 WashWave Laundry</p>

     <p>

        Fresh • Easy • Affordable

    </p>

</footer>

<script src="script.js"></script>

</body>

</html>
