<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking History | WashWave Laundry</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <div class="logo">
        <h1>🫧 WashWave Laundry</h1>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="booking.html">Booking</a>
        <a href="booking-history.html">Booking History</a>
        <a href="contact.html">Contact</a>
    </nav>

</header>

<section class="booking-page">

    <h1>Booking History</h1>
    <p>All customer booking records.</p>

    <div class="booking-form">

        <div class="history-container">

            <div id="historyContainer"></div>

            <button class="clear-btn" onclick="clearHistory()">
                🗑 Clear History
            </button>

        </div>

    </div>

</section>

<footer>
    <p>© 2026 WashWave Laundry</p>
    <p>Fresh • Easy • Affordable</p>
</footer>

<script>

let history =
JSON.parse(localStorage.getItem("bookingHistory")) || [];

let container =
document.getElementById("historyContainer");

if(history.length === 0){

    container.innerHTML = `

        <div class="history-card">

            <h3>No Booking Yet</h3>

            <p>Please make your first booking.</p>

        </div>

    `;

}
else{

    history.forEach(function(item){

        container.innerHTML += `

        <div class="history-card">

            <h3>${item.bookingID}</h3>

            <p>👤 <strong>Customer :</strong> ${item.customerName}</p>

            <p>📞 <strong>Phone :</strong> ${item.phone}</p>

            <p>🧺 <strong>Service :</strong> ${item.service}</p>

            <p>⚖ <strong>Weight :</strong> ${item.weight} kg</p>

            <p>💰 <strong>Total :</strong> RM ${item.total.toFixed(2)}</p>

            <p>📅 <strong>Date :</strong> ${item.date}</p>

            <p>🕒 <strong>Time :</strong> ${item.time}</p>

            <p class="pending">
                🟡 ${item.status}
            </p>

        </div>

        `;

    });

}

function clearHistory(){

    if(confirm("Delete all booking history?")){

        localStorage.removeItem("bookingHistory");

        location.reload();

    }

}

</script>

</body>
</html>
